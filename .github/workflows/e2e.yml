name: e2e

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  electron-ui:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 16.20.2
          cache: npm

      - name: Install Linux UI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libgtk-3-0 \
            libgbm1 \
            libnss3 \
            libasound2t64 \
            libxss1

      - name: Install dependencies
        run: npm ci

      - name: Run Electron E2E
        run: xvfb-run -a npm run test:e2e:ci
